name: Daily LinkedIn Outreach

on:
  # Runs 6 times a day (UTC) -> (IST)
  # 03:30 UTC = 09:00 IST
  # 08:30 UTC = 14:00 IST
  # 09:30 UTC = 15:00 IST
  # 14:30 UTC = 20:00 IST
  # 18:30 UTC = 00:00 IST
  # schedule:
  #   - cron: "30 3,6,8,10,12,14,18 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no emails sent)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      lookback_hours:
        description: "Hours to look back"
        required: false
        default: "24"

permissions:
  contents: write  # Needed to commit history/phone_leads back to repo

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run outreach agent
        env:
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALTERNATIVE_GEMINI_API_KEY: ${{ secrets.ALTERNATIVE_GEMINI_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          # Determine flags
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          HOURS="${{ github.event.inputs.lookback_hours }}"
          if [ -z "$HOURS" ]; then
            HOURS="24"
          fi

          python saved_posts_outreach.py --hours "$HOURS" $DRY_RUN_FLAG

      - name: Commit updated history and phone leads
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Add tracking files if they changed
          git add -f outreach_history.json phone_leads.json results/ 2>/dev/null || true

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: outreach history $(date -u +'%Y-%m-%d %H:%M UTC')"
            
            # Retry push with backoff for transient failures
            for attempt in {1..3}; do
              if git push origin main; then
                echo "Push successful on attempt $attempt"
                exit 0
              elif [ $attempt -lt 3 ]; then
                echo "Push attempt $attempt failed, retrying in $((attempt * 10)) seconds..."
                sleep $((attempt * 10))
              fi
            done
            
            echo "Push failed after 3 attempts"
            exit 1
          fi

      - name: Update Gmail token if refreshed
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GMAIL_TOKEN_JSON_SECRET: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          # If token.json exists, check if it's different from our current secret
          if [ -f token.json ]; then
            NEW_TOKEN=$(cat token.json)
            # Compare the raw JSON content
            if [ "$NEW_TOKEN" != "$GMAIL_TOKEN_JSON_SECRET" ]; then
              echo "Gmail token was refreshed. Updating GMAIL_TOKEN_JSON secret..."
              gh secret set GMAIL_TOKEN_JSON --body "$NEW_TOKEN"
              echo "Secret updated successfully."
            else
              echo "Gmail token is up to date."
            fi
          fi
