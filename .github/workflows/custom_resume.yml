name: Tailor Resume

on:
  workflow_dispatch:
    inputs:
      urn:
        description: 'LinkedIn Post URN (e.g., 7123456789...)'
        required: false
      jd_text:
        description: 'Custom Job Description (Paste text here)'
        required: false

jobs:
  tailor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libharfbuzz0b libpangoft2-1.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests weasyprint jinja2 python-dotenv google-api-python-client google-auth-oauthlib

      - name: Run Tailor Script
        env:
          GEMINI_API_KEY: ${{ secrets.RESUME_GEMINI_API_KEY }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
        run: |
          python tailor_resume.py \
            ${{ github.event.inputs.urn && format('--urn "{0}"', github.event.inputs.urn) || '' }} \
            ${{ github.event.inputs.jd_text && format('--jd "{0}"', github.event.inputs.jd_text) || '' }}
