name: Daily LinkedIn Outreach

on:
  # Runs 4 times a day: 9 AM, 3 PM (15:00), 8 PM (20:00), and 12 AM (00:00) UTC
  schedule:
    - cron: "0 0,9,15,20 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no emails sent)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      lookback_hours:
        description: "Hours to look back"
        required: false
        default: "24"

permissions:
  contents: write  # Needed to commit history/phone_leads back to repo

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run outreach agent
        env:
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          # Determine flags
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          HOURS="${{ github.event.inputs.lookback_hours }}"
          if [ -z "$HOURS" ]; then
            HOURS="24"
          fi

          python saved_posts_outreach.py --hours "$HOURS" $DRY_RUN_FLAG

      - name: Commit updated history and phone leads
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          # Add tracking files if they changed
          git add -f outreach_history.json phone_leads.json results/ 2>/dev/null || true

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: outreach history $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Update Gmail token if refreshed
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          # If token.json was updated (refreshed), we need to update the secret
          # GitHub Actions can't update secrets directly, so we log a reminder
          if [ -f token.json ]; then
            NEW_TOKEN=$(base64 -w 0 token.json)
            if [ "$NEW_TOKEN" != "$GMAIL_TOKEN_JSON" ]; then
              echo "::warning::Gmail token was refreshed. Update GMAIL_TOKEN_JSON secret with the new value from the committed token.json"
            fi
          fi
